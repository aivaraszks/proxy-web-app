<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open app</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Continue in app</h1>
      <p class="hint">Enter your email, then tap Open app to fire the same kind of Android VIEW intent as your adb test (custom scheme).</p>
      <form id="form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        <a id="open-app" class="btn-primary" href="#" role="button">Open app</a>
      </form>
      <a class="btn-secondary" href="https://www.google.com/">Open Google</a>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
