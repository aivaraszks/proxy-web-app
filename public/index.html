<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open app</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Continue in app</h1>
      <p class="hint">Enter your email, then we open your app with a new user id in the link.</p>
      <form id="form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com" />
        <button type="submit">Open app</button>
      </form>
      <p id="status" class="status" hidden></p>
      <p id="fallback" class="fallback" hidden>
        If nothing happens, tap:
        <a id="deeplink" href="#">open in app</a>
      </p>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
